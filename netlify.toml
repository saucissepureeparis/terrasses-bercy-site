[build]
  publish = "."

# Lighthouse CI : rapport automatique après chaque deploy
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "reports/lighthouse.html"

  [[plugins.inputs.audits]]
    path = ""
  [[plugins.inputs.audits]]
    path = "en"
  [[plugins.inputs.audits]]
    path = "es"

  [plugins.inputs.thresholds]
    performance = 0.85
    accessibility = 0.9
    "best-practices" = 0.9
    seo = 0.95

# ============ Security headers ============
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.zenchef.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://*.zenchef.com https://www.google.com; connect-src 'self' https://*.zenchef.com; base-uri 'self'; form-action 'self'"

# ============ Cache: assets immuables ============
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============ Cache: HTML court ============
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

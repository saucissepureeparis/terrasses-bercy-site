<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#8B1A1A">
  <meta name="robots" content="noindex, follow">

  <title>Page introuvable — La Terrasse Bercy</title>
  <meta name="description" content="La page que vous cherchez n'existe pas ou plus. Retournez à l'accueil de La Terrasse Bercy, brasserie parisienne à 5 min de l'Accor Arena.">

  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">

  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1410 0%, #3E2814 50%, #5C0F0F 100%);
      position: relative;
      overflow: hidden;
      padding: 2rem 1rem;
    }
    .page-404::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(197,162,88,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(139,26,26,0.3) 0%, transparent 50%);
      pointer-events: none;
    }
    .page-404-inner {
      position: relative;
      text-align: center;
      max-width: 640px;
      color: #FAF5EC;
    }
    .page-404-logo {
      width: 160px;
      height: auto;
      margin: 0 auto 3rem;
      opacity: 0.9;
    }
    .page-404-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 500;
      color: #C5A258;
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }
    .page-404-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 500;
      margin-bottom: 1rem;
      color: #FAF5EC;
    }
    .page-404-text {
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem;
      line-height: 1.6;
      color: rgba(250,245,236,0.75);
      margin-bottom: 2.5rem;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .page-404-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .page-404 .btn {
      padding: 0.9rem 1.8rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 4px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .page-404 .btn-primary {
      background: #C5A258;
      color: #1a1410;
    }
    .page-404 .btn-primary:hover {
      background: #E2C783;
      transform: translateY(-2px);
    }
    .page-404 .btn-ghost {
      border: 1px solid rgba(250,245,236,0.3);
      color: #FAF5EC;
    }
    .page-404 .btn-ghost:hover {
      border-color: #C5A258;
      background: rgba(197,162,88,0.08);
    }
  </style>
</head>
<body>

  <main class="page-404">
    <div class="page-404-inner">
      <img src="/assets/logo-white.svg" alt="La Terrasse Bercy" class="page-404-logo">

      <div class="page-404-code">404</div>
      <h1 class="page-404-title">Cette table n'est pas servie</h1>
      <p class="page-404-text">
        La page que vous cherchez n'existe pas, a été déplacée, ou nous l'avons débarrassée trop vite.
        <br>Revenez à l'accueil, ou appelez-nous directement — on se charge du reste.
      </p>

      <div class="page-404-actions">
        <a href="/" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2 7-7 7 7 2 2v9a2 2 0 01-2 2h-3a2 2 0 01-2-2v-4H10v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-9z"/></svg>
          Retour à l'accueil
        </a>
        <a href="tel:+33143070407" class="btn btn-ghost">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          01 43 07 04 07
        </a>
      </div>
    </div>
  </main>

</body>
</html>

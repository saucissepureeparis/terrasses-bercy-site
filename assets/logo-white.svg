      .ltw-sub { font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 500; fill: #FAF5EC; letter-spacing: 0.42em; }
      .ltw-tag { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 500; fill: #FAF5EC; letter-spacing: 0.38em; }

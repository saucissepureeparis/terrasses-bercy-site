    <circle cx="-110" cy="0" r="3.5" fill="#FAF5EC"/>
    <circle cx="-66" cy="0" r="3" fill="#FAF5EC"/>
    <circle cx="-22" cy="0" r="3" fill="#FAF5EC"/>
    <circle cx="22" cy="0" r="3" fill="#FAF5EC"/>
    <circle cx="66" cy="0" r="3" fill="#FAF5EC"/>
    <circle cx="110" cy="0" r="3.5" fill="#FAF5EC"/>

    <path d="M -110 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0 q 11 18 22 0"
